<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Wants to Zorp A Blorginaire?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    image-rendering: pixelated;
  }

  #screen {
    width: 512px;
    height: 480px;
    background: #000;
    position: relative;
    overflow: hidden;
    border: 4px solid #444;
    box-shadow: 0 0 40px rgba(0,255,100,0.15);
  }

  /* Scanline overlay */
  #screen::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15) 0px,
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events: none;
    z-index: 999;
  }

  .scene { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .scene.active { display: block; }

  /* ===== TITLE SCREEN ===== */
  #title-screen {
    background: #000;
    text-align: center;
  }
  #title-screen .stars {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
  #title-screen h1 {
    color: #5eff3e;
    font-size: 11px;
    margin-top: 80px;
    line-height: 2.2;
    text-shadow: 2px 2px #005500;
    position: relative;
    z-index: 2;
  }
  #title-screen h1 .big {
    font-size: 18px;
    color: #ffec27;
    display: block;
    margin: 12px 0;
    text-shadow: 2px 2px #886600;
  }
  #title-screen .press-start {
    color: #fff;
    font-size: 10px;
    margin-top: 80px;
    animation: blink 1s infinite;
    position: relative;
    z-index: 2;
  }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  #title-screen .alien-title {
    font-size: 60px;
    display: block;
    margin: 20px 0;
    position: relative;
    z-index: 2;
  }

  /* ===== WORMHOLE SEQUENCE ===== */
  #wormhole-screen {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .wormhole-ring {
    position: absolute;
    border: 3px solid;
    border-radius: 50%;
    animation: wormhole-spin 2s linear infinite;
  }
  @keyframes wormhole-spin {
    0% { transform: rotate(0deg) scale(1); opacity: 1; }
    100% { transform: rotate(360deg) scale(0); opacity: 0; }
  }
  #wormhole-text {
    position: relative;
    z-index: 10;
    color: #fff;
    font-size: 8px;
    text-align: center;
    line-height: 2.5;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #wormhole-text.visible { opacity: 1; }

  /* ===== STAGE / GAME SCREEN ===== */
  #game-screen {
    background: linear-gradient(180deg, #1a0033 0%, #2d004d 40%, #1a0033 100%);
  }
  .stage-lights {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 60px;
    display: flex;
    justify-content: space-around;
    padding: 8px;
  }
  .stage-light {
    width: 12px; height: 12px;
    border-radius: 50%;
    animation: light-flash 0.8s infinite alternate;
  }
  @keyframes light-flash { 0%{opacity:0.3} 100%{opacity:1} }

  .audience {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    height: 50px;
    display: flex;
    justify-content: center;
    gap: 2px;
    flex-wrap: wrap;
    overflow: hidden;
  }
  .audience-member {
    width: 14px; height: 18px;
    border-radius: 50% 50% 0 0;
    margin-top: auto;
  }

  /* Alien host */
  .alien-host {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
  }
  .alien-sprite {
    font-size: 48px;
    animation: alien-bob 1s ease-in-out infinite alternate;
  }
  @keyframes alien-bob {
    0% { transform: translateY(0); }
    100% { transform: translateY(-5px); }
  }
  .alien-name {
    color: #5eff3e;
    font-size: 7px;
    margin-top: 2px;
  }

  /* Dialog box */
  .dialog-box {
    position: absolute;
    bottom: 55px;
    left: 16px;
    right: 16px;
    background: #111;
    border: 3px solid #5eff3e;
    padding: 12px;
    color: #fff;
    font-size: 8px;
    line-height: 2;
    min-height: 60px;
    z-index: 10;
  }
  .dialog-box .speaker {
    color: #5eff3e;
    margin-bottom: 4px;
  }
  .dialog-box .continue-prompt {
    color: #ffec27;
    font-size: 6px;
    text-align: right;
    margin-top: 4px;
    animation: blink 0.6s infinite;
  }

  /* Audience speech bubble */
  .audience-bubble {
    position: absolute;
    bottom: 52px;
    background: #222;
    border: 2px solid #ff6ee6;
    color: #ff6ee6;
    font-size: 6px;
    padding: 6px 10px;
    line-height: 1.8;
    z-index: 8;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .audience-bubble.visible { opacity: 1; }
  .audience-bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 20px;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 6px solid #ff6ee6;
  }

  /* Answer choices */
  .choices {
    position: absolute;
    bottom: 55px;
    left: 16px;
    right: 16px;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .choice-btn {
    background: #1a0044;
    border: 2px solid #7744aa;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 10px 8px;
    cursor: pointer;
    text-align: left;
    line-height: 1.8;
    transition: background 0.1s, border-color 0.1s;
  }
  .choice-btn:hover {
    background: #330066;
    border-color: #ffec27;
    color: #ffec27;
  }
  .choice-btn .choice-label {
    color: #ffec27;
  }

  /* Question counter / prize ladder */
  .hud {
    position: absolute;
    top: 4px;
    right: 8px;
    color: #ffec27;
    font-size: 7px;
    z-index: 10;
    text-align: right;
    line-height: 2;
  }
  .hud .prize {
    color: #5eff3e;
  }

  .hud-left {
    position: absolute;
    top: 4px;
    left: 8px;
    color: #ff6ee6;
    font-size: 7px;
    z-index: 10;
    line-height: 2;
  }

  /* Prize ladder */
  .prize-ladder {
    position: absolute;
    top: 20px;
    right: 4px;
    z-index: 10;
    display: flex;
    flex-direction: column-reverse;
    gap: 1px;
  }
  .prize-step {
    font-size: 5px;
    color: #555;
    padding: 2px 4px;
    text-align: right;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .prize-step.active {
    color: #ffec27;
    text-shadow: 0 0 6px #ffec27;
  }
  .prize-step.won {
    color: #5eff3e;
  }

  /* Keyboard selected choice */
  .choice-btn.kb-selected {
    background: #330066;
    border-color: #ffec27;
    color: #ffec27;
    box-shadow: 0 0 8px rgba(255, 236, 39, 0.4);
  }
  .choice-btn.locked {
    background: #ffec27;
    color: #000;
    border-color: #fff;
    animation: lock-flash 0.15s infinite alternate;
  }
  @keyframes lock-flash {
    0% { opacity: 0.7; } 100% { opacity: 1; }
  }

  /* Dramatic dim overlay */
  .dim-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 9;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  .dim-overlay.active { opacity: 1; }

  /* ===== DANCE PARTY ===== */
  #dance-screen {
    text-align: center;
    overflow: hidden;
  }
  .dance-floor {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-wrap: wrap;
  }
  .dance-tile {
    width: 64px; height: 60px;
    animation: tile-flash 0.5s infinite alternate;
  }
  @keyframes tile-flash {
    0% { opacity: 0.6; } 100% { opacity: 1; }
  }
  .dance-text {
    position: absolute;
    top: 40px;
    width: 100%;
    color: #ffec27;
    font-size: 12px;
    z-index: 20;
    text-shadow: 2px 2px #880000;
    animation: dance-bounce 0.4s infinite alternate;
    line-height: 2.5;
  }
  @keyframes dance-bounce {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-8px) scale(1.05); }
  }
  .dancer {
    position: absolute;
    font-size: 36px;
    z-index: 15;
    animation: dancer-move 0.5s infinite alternate;
  }
  @keyframes dancer-move {
    0% { transform: translateY(0) rotate(-5deg); }
    100% { transform: translateY(-10px) rotate(5deg); }
  }

  .credits {
    position: absolute;
    bottom: 20px;
    width: 100%;
    color: #aaa;
    font-size: 7px;
    line-height: 2.5;
    z-index: 20;
    animation: credits-scroll 8s linear infinite;
  }
  @keyframes credits-scroll {
    0% { transform: translateY(100%); }
    100% { transform: translateY(-200%); }
  }

  .play-again-btn {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a0044;
    border: 3px solid #5eff3e;
    color: #5eff3e;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 12px 24px;
    cursor: pointer;
    z-index: 30;
    animation: blink 1s infinite;
  }
  .play-again-btn:hover {
    background: #330066;
    color: #ffec27;
    border-color: #ffec27;
  }
</style>
</head>
<body>

<div id="screen">

  <!-- TITLE SCREEN -->
  <div id="title-screen" class="scene active">
    <canvas class="stars" id="stars-canvas"></canvas>
    <h1>
      WELCOME TO
      <span class="big">WHO WANTS TO ZORP</span>
      <span class="big">A BLORGINAIRE?</span>
    </h1>
    <div class="alien-title">&#x1F47E;</div>
    <div class="press-start">&#x25B6; PRESS START &#x25C0;</div>
  </div>

  <!-- WORMHOLE SEQUENCE -->
  <div id="wormhole-screen" class="scene">
    <div id="wormhole-container"></div>
    <div id="wormhole-text"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="scene">
    <div class="stage-lights" id="stage-lights"></div>
    <div class="dim-overlay" id="dim-overlay"></div>
    <div class="hud-left" id="hud-left"></div>
    <div class="prize-ladder" id="prize-ladder"></div>
    <div class="alien-host">
      <div class="alien-sprite" id="alien-sprite">&#x1F47E;</div>
      <div class="alien-name">ZORGBLAX THE MAGNIFICENT</div>
    </div>
    <div class="dialog-box" id="dialog-box" style="display:none;">
      <div class="speaker" id="dialog-speaker"></div>
      <div id="dialog-text"></div>
      <div class="continue-prompt" style="display:none;">&#x25BC; CLICK or PRESS SPACE</div>
    </div>
    <div class="choices" id="choices" style="display:none;"></div>
    <div class="audience-bubble" id="audience-bubble"></div>
    <div class="audience" id="audience"></div>
  </div>

  <!-- DANCE PARTY -->
  <div id="dance-screen" class="scene">
    <div class="dance-floor" id="dance-floor"></div>
    <div class="dance-text" id="dance-text"></div>
    <div id="dancers"></div>
    <div class="credits" id="credits"></div>
    <button class="play-again-btn" id="play-again-btn" style="display:none;">PLAY AGAIN</button>
  </div>

</div>

<script>
// ===== AUDIO ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playTone(freq, duration, type = 'square', volume = 0.08) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxType() { [200,300,400,500].forEach((f,i) => setTimeout(() => playTone(f, 0.08), i * 60)); }
function sfxSelect() { playTone(600, 0.06); playTone(800, 0.06); setTimeout(() => playTone(1000, 0.1), 80); }
function sfxWarp() {
  for (let i = 0; i < 20; i++) setTimeout(() => playTone(200 + i * 80, 0.12, 'sawtooth', 0.04), i * 50);
}
function sfxCorrect() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.15), i * 100));
}
function sfxDance() {
  const notes = [262, 330, 392, 523, 392, 330, 262, 330, 392, 523, 659, 784];
  notes.forEach((f, i) => setTimeout(() => playTone(f, 0.12, 'square', 0.06), i * 150));
  setTimeout(sfxDance, notes.length * 150);
}

// ===== STARFIELD =====
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 512;
  canvas.height = 480;
  const stars = Array.from({ length: 80 }, () => ({
    x: Math.random() * 512, y: Math.random() * 480,
    s: Math.random() * 2 + 1, speed: Math.random() * 0.5 + 0.2
  }));
  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 512, 480);
    stars.forEach(s => {
      ctx.fillStyle = `hsl(${Math.random() * 60 + 100}, 80%, ${60 + Math.random() * 40}%)`;
      ctx.fillRect(s.x, s.y, s.s, s.s);
      s.y += s.speed;
      if (s.y > 480) { s.y = 0; s.x = Math.random() * 512; }
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ===== SCENE MANAGEMENT =====
function showScene(id) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== TYPEWRITER =====
let typewriterSkip = false;
let typewriterResolve = null;

function typeText(el, text, speed = 35) {
  return new Promise(resolve => {
    el.textContent = '';
    typewriterSkip = false;
    typewriterResolve = null;
    let i = 0;
    const interval = setInterval(() => {
      if (typewriterSkip) {
        el.textContent = text;
        clearInterval(interval);
        typewriterSkip = false;
        resolve();
        return;
      }
      el.textContent += text[i];
      if (i % 2 === 0) playTone(440 + Math.random() * 100, 0.03, 'square', 0.03);
      i++;
      if (i >= text.length) { clearInterval(interval); resolve(); }
    }, speed);
  });
}

// Click/key to advance dialog
let waitingForAdvance = false;
function waitForAdvance() {
  return new Promise(resolve => {
    waitingForAdvance = true;
    typewriterResolve = resolve;
    // Show continue prompt
    const prompt = document.querySelector('.continue-prompt');
    if (prompt) prompt.style.display = 'block';
  });
}

document.addEventListener('click', (e) => {
  if (e.target.closest('.choice-btn') || e.target.closest('.play-again-btn') || e.target.closest('#title-screen')) return;
  if (waitingForAdvance && typewriterResolve) {
    waitingForAdvance = false;
    const prompt = document.querySelector('.continue-prompt');
    if (prompt) prompt.style.display = 'none';
    sfxSelect();
    typewriterResolve();
    typewriterResolve = null;
  } else {
    typewriterSkip = true;
  }
});

document.addEventListener('keydown', (e) => {
  // Arrow keys for choice navigation
  if (choicesActive) {
    const btns = document.querySelectorAll('.choice-btn');
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      playTone(300, 0.03, 'square', 0.04);
      highlightChoice((selectedChoice + 1) % 4);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      playTone(300, 0.03, 'square', 0.04);
      highlightChoice((selectedChoice + 3) % 4);
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      confirmAnswer(selectedChoice);
    }
    // A/B/C/D direct select
    const letterMap = { 'a': 0, 'b': 1, 'c': 2, 'd': 3, '1': 0, '2': 1, '3': 2, '4': 3 };
    if (letterMap[e.key.toLowerCase()] !== undefined) {
      e.preventDefault();
      confirmAnswer(letterMap[e.key.toLowerCase()]);
    }
    return;
  }

  if (e.key === 'Enter' || e.key === ' ') {
    // Title screen start
    const title = document.getElementById('title-screen');
    if (title.classList.contains('active')) {
      e.preventDefault();
      ensureAudio();
      sfxSelect();
      playWormhole();
      return;
    }
    // Dialog advance
    if (waitingForAdvance && typewriterResolve) {
      e.preventDefault();
      waitingForAdvance = false;
      const prompt = document.querySelector('.continue-prompt');
      if (prompt) prompt.style.display = 'none';
      sfxSelect();
      typewriterResolve();
      typewriterResolve = null;
    } else {
      typewriterSkip = true;
    }
  }
});

// ===== WORMHOLE SEQUENCE =====
async function playWormhole() {
  showScene('wormhole-screen');
  sfxWarp();
  const container = document.getElementById('wormhole-container');
  const colors = ['#5eff3e', '#ffec27', '#ff6ee6', '#29adff', '#ff004d'];
  for (let i = 0; i < 12; i++) {
    const ring = document.createElement('div');
    ring.className = 'wormhole-ring';
    const size = 300 - i * 20;
    ring.style.width = size + 'px';
    ring.style.height = size + 'px';
    ring.style.borderColor = colors[i % colors.length];
    ring.style.left = (256 - size / 2) + 'px';
    ring.style.top = (240 - size / 2) + 'px';
    ring.style.animationDelay = (i * 0.15) + 's';
    container.appendChild(ring);
  }

  const textEl = document.getElementById('wormhole-text');
  const lines = [
    "You were just eating cereal...",
    "When suddenly a beam of light\nhit your living room!",
    "ZZZZAAAAAPPPP!!!",
    "You've been teleported across\n47 dimensions!",
    "You land on... a stage??"
  ];
  for (const line of lines) {
    textEl.textContent = '';
    textEl.classList.add('visible');
    await typeText(textEl, line, 40);
    await sleep(1200);
  }
  await sleep(500);
  container.innerHTML = '';
  startGame();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ===== STAGE SETUP =====
function buildStage() {
  // Lights
  const lightsEl = document.getElementById('stage-lights');
  lightsEl.innerHTML = '';
  const lightColors = ['#ff004d','#ffec27','#5eff3e','#29adff','#ff6ee6','#ff004d','#ffec27','#5eff3e'];
  lightColors.forEach((c, i) => {
    const l = document.createElement('div');
    l.className = 'stage-light';
    l.style.background = c;
    l.style.animationDelay = (i * 0.15) + 's';
    lightsEl.appendChild(l);
  });

  // Audience
  const audEl = document.getElementById('audience');
  audEl.innerHTML = '';
  const alienEmojis = ['👽','👾','🛸','🤖','👹','🐙','🦑','🪼'];
  for (let i = 0; i < 30; i++) {
    const m = document.createElement('div');
    m.className = 'audience-member';
    m.style.fontSize = '14px';
    m.textContent = alienEmojis[i % alienEmojis.length];
    m.style.animationDelay = (Math.random() * 2) + 's';
    audEl.appendChild(m);
  }
}

// ===== QUESTIONS =====
const QUESTIONS = [
  {
    q: "Human greeting ritual: What is a 'handshake'?",
    a: ["Two humans linking tentacles","A seizure of the upper limb","Checking each other for weapons","A mating display involving palms"],
    reactions: [
      "LINKING TENTACLES?! How intimate! On my planet that means you're MARRIED now!",
      "A SEIZURE?! And you do this ON PURPOSE?! Humans are braver than I thought!",
      "WEAPONS CHECK!! I knew humans were paranoid! Very wise, very wise...",
      "A MATING DISPLAY?! So THAT'S why my Earth ambassador kept shaking hands with everyone! SECURITY!!"
    ],
    reaction: "Fascinating!! On my planet we greet by spitting acid. Much more efficient!"
  },
  {
    q: "Why do humans stare at small glowing rectangles for 8 hours daily?",
    a: ["Recharging their life force","Worshipping their silicon overlords","They forgot how to look up","The rectangles contain tiny prisoners they must watch"],
    reactions: [
      "RECHARGING!! So humans ARE partially electronic! My thesis was RIGHT!",
      "SILICON OVERLORDS! I must warn the Galactic Council about Earth's REAL rulers!",
      "They FORGOT?! How do you forget an ENTIRE DIRECTION?! Earth schooling must be terrible!",
      "TINY PRISONERS!! That's horrifying! ...Can I see them? For research purposes."
    ],
    reaction: "I KNEW IT! The rectangles are in charge!! I must warn the Galactic Council!"
  },
  {
    q: "What is the human food known as 'pizza'?",
    a: ["A circular debt arrangement","Flattened wheat with old milk on top","A peace treaty you eat","An edible flying saucer prototype"],
    reactions: [
      "A DEBT CIRCLE?! So your economy runs on cheese and bread?! ...Actually that explains a LOT.",
      "OLD MILK ON WHEAT?! When you describe it like that, I'm HORRIFIED. But also hungry??",
      "AN EDIBLE PEACE TREATY!! No wonder wars start when someone takes the last slice!",
      "EDIBLE SAUCERS!! You EAT your spacecraft prototypes?! No wonder you haven't left your solar system!"
    ],
    reaction: "You EAT your flying saucers?! No wonder you haven't achieved light speed!"
  },
  {
    q: "Why do humans voluntarily enter a 'gym'?",
    a: ["Punishment for eating too much pizza","To practice lifting things and putting them down","A cult that worships mirrors","They enjoy suffering in spandex"],

// Varied thinking lines (Zorgblax "processing" the answer)
const THINKING_LINES = [
  "Hmmmm... processing through my VERY ADVANCED brain...",
  "Let me consult my Earth Manual... *reads book upside down*",
  "My 47 brains are computing... carry the one...",
  "INTERESTING. Running answer through the Zorputer 3000...",
  "Checking my notes... *shuffles papers that are clearly blank*",
  "One moment... *pretends to call someone on space phone* ...yes? ...uh huh... thank you.",
  "Analyzing... I am DEFINITELY not just guessing...",
  "Cross-referencing with the Galactic Encyclopedia of Earth Nonsense...",
  "Hold on, my answer tentacle is tingling... that's either good or I'm having a stroke...",
  "Let me ask the audience-- NO WAIT, they don't know either. Nobody knows. I'm winging it."
];

// Audience heckles between questions
const AUDIENCE_HECKLES = [
  "I BET 3 GLORBONS ON THE HUMAN!",
  "THAT'S NOT EVEN A REAL WORD!",
  "MY SPAWN-LARVAE COULD ANSWER THAT!",
  "ZORGBLAX DOESN'T KNOW ANYTHING!",
  "IS EARTH EVEN A REAL PLANET?!",
  "I CAME HERE FOR THE FREE SNACKS!",
  "THE HUMAN SMELLS LIKE CALCIUM!",
  "BRING BACK THE BLOB FROM LAST WEEK!",
  "BOOOOOO! ...wait, which one am I booing?",
  "I LEFT MY HOME NEBULA FOR THIS?!",
  "DOES THE HUMAN DO TRICKS?!",
  "THIS IS RIGGED! ...right? IS IT?!"
];

// Zorgblax's suspicion lines (escalating through the game)
const SUSPICION_LINES = [
  null, // Q1: no suspicion yet
  null, // Q2: still chill
  "Wait... you seem to know a LOT about your own planet. Suspicious...",
  null, // Q4: lets it go
  "Hmm... you're getting these awfully fast. Are you ACTUALLY from Earth?!",
  null, // Q6
  "HOLD ON. Are you cheating?! *checks under your chair* ...I don't know what I expected to find.",
  null, // Q8
  "I've got my EYE STALKS on you, human. SEVEN of them. You can't fool ALL seven.",
  null  // Q10: too excited about the finale
];

const PRIZES = [
  "100 Zorpbucks",
  "500 Zorpbucks + a USED SOCK",
  "1,000 Zorpbucks",
  "5,000 Zorpbucks + a SLIGHTLY HAUNTED MOON",
  "10,000 Zorpbucks",
  "50,000 Zorpbucks + NAMING RIGHTS TO A COMET",
  "100,000 Zorpbucks",
  "500,000 Zorpbucks + a CERTIFICATE SAYING YOU'RE OKAY",
  "1 MILLION Zorpbucks + EARTH'S PARKING SPOT IN THE GALAXY",
  "1 BLORGINAIRE (a number so big we had to invent it)"
];

// ===== GAME STATE =====
let currentQuestion = 0;

// Show audience bubble briefly
function showAudienceBubble(text) {
  const bubble = document.getElementById('audience-bubble');
  bubble.textContent = text;
  bubble.style.left = (60 + Math.random() * 300) + 'px';
  bubble.classList.add('visible');
  setTimeout(() => bubble.classList.remove('visible'), 2500);
}

async function startGame() {
  showScene('game-screen');
  buildStage();
  currentQuestion = 0;
  updateHUD();

  // Intro dialog
  await showDialog("ZORGBLAX", "WELCOME, DISGUSTING LITTLE EARTH CREATURE!");
  await waitForAdvance();
  await showDialog("ZORGBLAX", "You have been chosen to compete on the galaxy's #1 game show!");
  await waitForAdvance();
  showAudienceBubble("WOOOOO! FRESH MEAT!");
  await showDialog("ZORGBLAX", "Answer my BRILLIANT questions about your dumb planet and win ZORPBUCKS!");
  await waitForAdvance();
  await showDialog("ZORGBLAX", "Don't worry... I DEFINITELY know all the right answers.");
  await waitForAdvance();
  await showDialog("ZORGBLAX", "I studied your planet for ALMOST fifteen minutes. Let's GO!");
  await waitForAdvance();

  askQuestion();
}

function updateHUD() {
  document.getElementById('hud-left').innerHTML =
    currentQuestion > 0 ? `WON: ${PRIZES[currentQuestion - 1]}` : 'WON: Nothing yet!';
  // Update prize ladder
  const ladder = document.getElementById('prize-ladder');
  ladder.innerHTML = '';
  PRIZES.forEach((p, i) => {
    const step = document.createElement('div');
    step.className = 'prize-step';
    const shortName = p.length > 22 ? p.substring(0, 20) + '..' : p;
    step.textContent = (i + 1) + '. ' + shortName;
    if (i < currentQuestion) step.classList.add('won');
    if (i === currentQuestion) step.classList.add('active');
    ladder.appendChild(step);
  });
}

function showDialog(speaker, text) {
  const box = document.getElementById('dialog-box');
  const speakerEl = document.getElementById('dialog-speaker');
  const textEl = document.getElementById('dialog-text');
  const choices = document.getElementById('choices');
  const prompt = document.querySelector('.continue-prompt');
  choices.style.display = 'none';
  box.style.display = 'block';
  if (prompt) prompt.style.display = 'none';
  speakerEl.textContent = speaker + ':';
  return typeText(textEl, text);
}

async function askQuestion() {
  updateHUD();
  const q = QUESTIONS[currentQuestion];

  // Occasional audience heckle before question
  if (currentQuestion > 0 && Math.random() > 0.4) {
    const heckle = AUDIENCE_HECKLES[Math.floor(Math.random() * AUDIENCE_HECKLES.length)];
    showAudienceBubble(heckle);
  }

  // Suspicion line (running gag)
  const suspicion = SUSPICION_LINES[currentQuestion];
  if (suspicion) {
    document.getElementById('alien-sprite').textContent = '🤨';
    await showDialog("ZORGBLAX", suspicion);
    await waitForAdvance();
    document.getElementById('alien-sprite').textContent = '👾';
  }

  // Ask the question
  await showDialog("ZORGBLAX", "For " + PRIZES[currentQuestion] + "...");
  await waitForAdvance();
  await showDialog("ZORGBLAX", q.q);
  await waitForAdvance();

  // Show choices
  const box = document.getElementById('dialog-box');
  box.style.display = 'none';
  const choicesEl = document.getElementById('choices');
  choicesEl.style.display = 'grid';
  choicesEl.innerHTML = '';
  selectedChoice = 0;
  choicesActive = true;

  const labels = ['A', 'B', 'C', 'D'];
  q.a.forEach((answer, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    if (i === 0) btn.classList.add('kb-selected');
    btn.innerHTML = `<span class="choice-label">${labels[i]}:</span> ${answer}`;
    btn.onclick = () => { if (choicesActive) confirmAnswer(i); };
    btn.onmouseenter = () => { if (choicesActive) highlightChoice(i); };
    choicesEl.appendChild(btn);
  });
}

// Keyboard navigation state
let selectedChoice = 0;
let choicesActive = false;

function highlightChoice(index) {
  selectedChoice = index;
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => b.classList.toggle('kb-selected', i === index));
}

// "Final answer" confirmation
async function confirmAnswer(index) {
  choicesActive = false;
  highlightChoice(index);
  sfxSelect();

  const btns = document.querySelectorAll('.choice-btn');
  btns[index].classList.add('locked');

  // Show confirmation dialog over the choices
  const box = document.getElementById('dialog-box');
  box.style.display = 'block';
  box.style.zIndex = '15';
  await typeText(document.getElementById('dialog-text'), "Is that your FINAL ANSWER, Earth creature?!");
  document.getElementById('dialog-speaker').textContent = 'ZORGBLAX:';
  await waitForAdvance();
  box.style.display = 'none';
  box.style.zIndex = '10';

  selectAnswer(index);
}

async function selectAnswer(index) {
  const choicesEl = document.getElementById('choices');
  const dimOverlay = document.getElementById('dim-overlay');

  // Flash the selected answer
  const btns = choicesEl.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => {
    if (i === index) {
      b.style.background = '#ffec27';
      b.style.color = '#000';
      b.style.borderColor = '#fff';
      b.style.zIndex = '20';
      b.style.position = 'relative';
    } else {
      b.style.opacity = '0.2';
    }
    b.onclick = null;
  });

  // Dramatic dim
  dimOverlay.classList.add('active');
  await sleep(600);

  // Varied thinking line
  choicesEl.style.display = 'none';
  dimOverlay.classList.remove('active');
  const q = QUESTIONS[currentQuestion];
  const thinkLine = THINKING_LINES[currentQuestion % THINKING_LINES.length];
  document.getElementById('alien-sprite').textContent = '🤔';
  await showDialog("ZORGBLAX", thinkLine);
  await sleep(2000);

  // Drumroll tension (using audio)
  for (let i = 0; i < 8; i++) {
    setTimeout(() => playTone(100 + Math.random() * 50, 0.06, 'square', 0.04), i * 80);
  }
  await sleep(800);

  // Always "correct"
  sfxCorrect();
  document.getElementById('alien-sprite').textContent = '🥳';

  const correctLines = [
    "CORRECT!!! (I think?!)",
    "YES!! That's what I had written down! *hides blank card*",
    "ABSOLUTELY RIGHT!! ...probably! Who's keeping track?!",
    "NAILED IT!! My answer tentacle confirms it!",
    "CORRECT!! The Zorputer 3000 agrees! (it's just a box with a face drawn on it)"
  ];
  const correctLine = correctLines[Math.floor(Math.random() * correctLines.length)];
  await showDialog("ZORGBLAX", correctLine + " You win " + PRIZES[currentQuestion] + "!");
  showAudienceBubble(Math.random() > 0.5 ? "WOOOOOOO!!" : "HOW?! IMPOSSIBLE!");
  await waitForAdvance();

  // Answer-specific reaction
  document.getElementById('alien-sprite').textContent = '😱';
  const reaction = q.reactions[index];
  await showDialog("ZORGBLAX", reaction);
  await waitForAdvance();

  document.getElementById('alien-sprite').textContent = '👾';
  currentQuestion++;
  if (currentQuestion >= QUESTIONS.length) {
    startDanceParty();
  } else {
    askQuestion();
  }
}

// ===== DANCE PARTY =====
function startDanceParty() {
  showScene('dance-screen');
  sfxDance();

  // Build dance floor
  const floor = document.getElementById('dance-floor');
  floor.innerHTML = '';
  const colors = ['#ff004d','#ffec27','#5eff3e','#29adff','#ff6ee6','#ff77a8','#ffa300','#7e2553'];
  for (let i = 0; i < 64; i++) {
    const tile = document.createElement('div');
    tile.className = 'dance-tile';
    tile.style.background = colors[Math.floor(Math.random() * colors.length)];
    tile.style.animationDelay = (Math.random() * 0.5) + 's';
    floor.appendChild(tile);
  }

  // Randomize tiles continuously
  setInterval(() => {
    floor.querySelectorAll('.dance-tile').forEach(t => {
      t.style.background = colors[Math.floor(Math.random() * colors.length)];
    });
  }, 500);

  // Dance text
  document.getElementById('dance-text').innerHTML =
    "&#x1F389; YOU ARE A BLORGINAIRE! &#x1F389;<br>&#x1F47E; DANCE PARTY!! &#x1F47E;";

  // Dancers
  const dancersEl = document.getElementById('dancers');
  dancersEl.innerHTML = '';
  const dancerEmojis = ['👾','👽','🛸','🤖','🕺','💃','🐙','🪩','🦑','🎷','🎸','🥁'];
  dancerEmojis.forEach((emoji, i) => {
    const d = document.createElement('div');
    d.className = 'dancer';
    d.textContent = emoji;
    d.style.left = (30 + (i % 6) * 78) + 'px';
    d.style.top = (160 + Math.floor(i / 6) * 100) + 'px';
    d.style.animationDelay = (i * 0.12) + 's';
    dancersEl.appendChild(d);
  });

  // Credits
  document.getElementById('credits').innerHTML =
    "CREATED BY ZORGBLAX PRODUCTIONS<br><br>" +
    "HOST: ZORGBLAX THE MAGNIFICENT<br><br>" +
    "CONTESTANT: YOU (Earth Creature #7,832,491,002)<br><br>" +
    "CATERING: BLORP'S SPACE DINER<br><br>" +
    "ZORPBUCKS HAVE NO VALUE IN ANY KNOWN DIMENSION<br><br>" +
    "NO HUMANS WERE HARMED (probably)<br><br>" +
    "&#x1F47E; THANKS FOR PLAYING! &#x1F47E;";

  // Play again button
  setTimeout(() => {
    document.getElementById('play-again-btn').style.display = 'block';
  }, 3000);
}

// ===== INIT =====
initStars();

document.getElementById('title-screen').addEventListener('click', () => {
  ensureAudio();
  sfxSelect();
  playWormhole();
});

// Title screen keyboard handler is merged into the main keydown listener above

document.getElementById('play-again-btn').addEventListener('click', () => {
  location.reload();
});
</script>
